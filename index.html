<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Matemática Discreta</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .card-flip { perspective: 1000px; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; }
        .card-back { transform: rotateY(180deg); }
        
        /* Efeito de desfoque para esconder o conteúdo do verso */
        .conteudo-oculto { filter: blur(6px); pointer-events: none; user-select: none; transition: filter 0.3s ease; }
        .conteudo-visivel { filter: blur(0); pointer-events: auto; user-select: text; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full text-center">
        <h1 class="text-3xl font-bold mb-2 text-indigo-400">Consulta de Cartas</h1>
        <p class="text-slate-400 mb-6 text-sm">Buscando dados integrados de cartas.csv e respostas.csv</p>

        <div class="bg-slate-800 p-4 rounded-xl mb-6 border border-slate-700 flex gap-3 items-end justify-center">
            <div class="text-left w-20">
                <label class="text-xs font-bold uppercase text-slate-400 block mb-1">ID</label>
                <input type="number" id="busca-id" value="1" class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-center text-white focus:outline-none focus:border-indigo-500">
            </div>
            <div class="text-left w-20">
                <label class="text-xs font-bold uppercase text-slate-400 block mb-1">Ordem</label>
                <input type="number" id="busca-ordem" value="1" min="1" max="4" class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-center text-white focus:outline-none focus:border-indigo-500">
            </div>
            <button onclick="buscarCarta()" class="bg-indigo-600 hover:bg-indigo-500 active:scale-95 transition text-white font-bold px-4 py-2 rounded h-10 cursor-pointer">
                Buscar 🔍
            </button>
        </div>

        <div id="card-container" class="card-flip w-full h-[450px] cursor-pointer hidden">
            <div id="card-inner" class="card-inner w-full h-full relative">
                
                <div onclick="girarCarta()" class="card-front absolute w-full h-full bg-slate-800 rounded-2xl p-6 flex flex-col justify-between border-2 border-indigo-500 shadow-2xl">
                    <div class="flex justify-between items-center text-sm font-semibold uppercase tracking-wider text-indigo-400">
                        <span id="card-tipo">TIPO</span>
                        <span id="card-id-ordem">ID: -- | Ordem: --</span>
                    </div>
                    <div class="my-auto text-center">
                        <p class="text-xs text-slate-500 mb-3 font-mono tracking-widest">PERGUNTA</p>
                        <p id="card-pergunta" class="text-xl font-semibold text-slate-100 bg-slate-900/40 p-4 rounded-xl border border-slate-700/50 shadow-inner"></p>
                    </div>
                    <div class="text-xs text-indigo-400 font-semibold animate-pulse text-center">
                        Toque na carta para ver a resolução 🔄
                    </div>
                </div>

                <div class="card-back absolute w-full h-full bg-indigo-950 rounded-2xl p-5 flex flex-col justify-between border-2 border-emerald-500 shadow-2xl text-left">
                    
                    <div class="space-y-4 overflow-y-auto pr-1">
                        <div class="border-b border-indigo-900/50 pb-2">
                            <div class="flex justify-between items-center mb-1">
                                <h3 class="text-xs font-bold text-emerald-400 uppercase">Dica / Definição:</h3>
                                <button onclick="revelarSecao('card-dica', this)" class="text-[10px] bg-indigo-800 hover:bg-indigo-700 text-white px-2 py-0.5 rounded font-medium transition cursor-pointer">Revelar</button>
                            </div>
                            <p id="card-dica" class="text-xs text-slate-200 conteudo-oculto"></p>
                        </div>

                        <div class="border-b border-indigo-900/50 pb-2">
                            <div class="flex justify-between items-center mb-1">
                                <h3 class="text-xs font-bold text-amber-400 uppercase">Exemplo Prático:</h3>
                                <button onclick="revelarSecao('card-exemplo', this)" class="text-[10px] bg-indigo-800 hover:bg-indigo-700 text-white px-2 py-0.5 rounded font-medium transition cursor-pointer">Revelar</button>
                            </div>
                            <p id="card-exemplo" class="text-xs text-slate-300 font-mono bg-slate-900/50 p-2 rounded mt-1 conteudo-oculto"></p>
                        </div>
                    </div>

                    <div class="mt-2">
                        <div class="flex justify-between items-center mb-1 px-1">
                            <span class="text-xs uppercase font-bold text-slate-400">Gabarito:</span>
                            <button onclick="revelarSecao('card-resposta', this)" class="text-[10px] bg-emerald-700 hover:bg-emerald-600 text-white px-2 py-0.5 rounded font-medium transition cursor-pointer">Revelar Resposta</button>
                        </div>
                        <div class="bg-emerald-500 text-slate-950 font-bold rounded-xl p-3 text-center min-h-[50px] flex items-center justify-center">
                            <span id="card-resposta" class="text-sm conteudo-oculto"></span>
                        </div>
                    </div>

                    <button onclick="girarCarta()" class="text-center text-xs text-slate-400 hover:text-white mt-2 block w-full transition cursor-pointer">
                        ↩ Voltar para a pergunta
                    </button>
                </div>

            </div>
        </div>

    </div>

    <script>
        // Tabelas separadas guardadas na memória
        let dadosCartas = [];
        let dadosPerguntas = [];

        // Função para carregar cada CSV individualmente com Promises
        function carregarArquivoCSV(url) {
            return new Promise((resolve, reject) => {
                Papa.parse(url, {
                    download: true,
                    header: true,
                    delimiter: ";",
                    skipEmptyLines: true,
                    complete: function(resultado) {
                        resolve(resultado.data);
                    },
                    error: function(erro) {
                        reject(erro);
                    }
                });
            });
        }

        // Pipeline que carrega cartas.csv e respostas.csv simultaneamente
        function inicializarPipeline() {
            Promise.all([
                carregarArquivoCSV("./cartas.csv"),
                carregarArquivoCSV("./respostas.csv")
            ])
            .then(([resCartas, resPerguntas]) => {
                dadosCartas = resCartas;
                dadosPerguntas = resPerguntas;
                
                // Realiza a busca padrão inicial do app
                buscarCarta();
            })
            .catch(erro => {
                console.error("Erro no pipeline de arquivos do jogo:", erro);
                alert("Erro ao carregar os arquivos CSV. Certifique-se de que os arquivos 'cartas.csv' e 'respostas.csv' estão com esses nomes exatos e salvos na mesma pasta do index.html.");
            });
        }

        // Executa a busca cruzada nas duas tabelas por ID e Ordem
        function buscarCarta() {
            const idBuscado = document.getElementById('busca-id').value.trim();
            const ordemBuscada = document.getElementById('busca-ordem').value.trim();

            // 1. Procura a pergunta em respostas.csv
            const perguntaEncontrada = dadosPerguntas.find(item => 
                String(item.id) === idBuscado && String(item.ordem) === ordemBuscada
            );

            // 2. Procura as dicas e respostas em cartas.csv
            const cartaEncontrada = dadosCartas.find(item => 
                String(item.id) === idBuscado && String(item.ordem) === ordemBuscada
            );

            // Verifica se achou os dados nos dois arquivos para cruzar as informações
            if (perguntaEncontrada && cartaEncontrada) {
                // Desvira a carta para a frente antes de trocar os textos
                document.getElementById('card-inner').classList.remove('flipped');
                resetarOcultamento();

                setTimeout(() => {
                    // Monta o cabeçalho
                    const tituloCard = perguntaEncontrada.titulo || perguntaEncontrada.tipo || cartaEncontrada.tipo || "LÓGICA";
                    document.getElementById('card-tipo').innerText = tituloCard;
                    document.getElementById('card-id-ordem').innerText = `ID: ${cartaEncontrada.id} • Ordem: ${cartaEncontrada.ordem}`;
                    
                    // Atualiza a FRENTE com respostas.csv
                    document.getElementById('card-pergunta').innerText = perguntaEncontrada.pergunta;
                    
                    // Atualiza o VERSO com cartas.csv
                    document.getElementById('card-dica').innerText = cartaEncontrada.dica_definicao;
                    document.getElementById('card-exemplo').innerText = cartaEncontrada.exemplo;
                    document.getElementById('card-resposta').innerText = cartaEncontrada.resposta;

                    // Mostra a carta na tela
                    document.getElementById('card-container').classList.remove('hidden');
                }, 150);
            } else {
                alert(`Combinação não encontrada! Verifique se o ID ${idBuscado} e Ordem ${ordemBuscada} existem tanto em cartas.csv quanto em respostas.csv.`);
            }
        }

        // Função para rotacionar a carta
        function girarCarta() {
            document.getElementById('card-inner').classList.toggle('flipped');
        }

        // Função para remover ou adicionar o desfoque de cada seção
        function revelarSecao(idElemento, botao) {
            const elemento = document.getElementById(idElemento);
            elemento.classList.toggle('conteudo-oculto');
            elemento.classList.toggle('conteudo-visivel');

            if(elemento.classList.contains('conteudo-visivel')) {
                botao.innerText = "Ocultar";
                botao.classList.replace('bg-indigo-800', 'bg-slate-700');
                botao.classList.replace('bg-emerald-700', 'bg-slate-700');
            } else {
                botao.innerText = idElemento === 'card-resposta' ? "Revelar Resposta" : "Revelar";
                if(idElemento === 'card-resposta') {
                    botao.classList.replace('bg-slate-700', 'bg-emerald-700');
                } else {
                    botao.classList.replace('bg-slate-700', 'bg-indigo-800');
                }
            }
        }

        // Reseta os botões e aplica o desfoque novamente ao mudar de carta
        function resetarOcultamento() {
            const ids = ['card-dica', 'card-exemplo', 'card-resposta'];
            ids.forEach(id => {
                const el = document.getElementById(id);
                el.classList.remove('conteudo-visivel');
                el.classList.add('conteudo-oculto');
            });

            const botoes = document.querySelectorAll('.card-back button');
            botoes.forEach(btn => {
                if(btn.innerText === "Ocultar") {
                    if(btn.getAttribute('onclick').includes('card-resposta')) {
                        btn.innerText = "Revelar Resposta";
                        btn.className = "text-[10px] bg-emerald-700 hover:bg-emerald-600 text-white px-2 py-0.5 rounded font-medium transition cursor-pointer";
                    } else {
                        btn.innerText = "Revelar";
                        btn.className = "text-[10px] bg-indigo-800 hover:bg-indigo-700 text-white px-2 py-0.5 rounded font-medium transition cursor-pointer";
                    }
                }
            });
        }

        // Garante que a inicialização do pipeline rode assim que a página terminar de carregar
        document.addEventListener("DOMContentLoaded", inicializarPipeline);
    </script>
</body>
</html>
